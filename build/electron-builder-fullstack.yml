appId: com.cerebro.desktop
productName: Cerebro
copyright: Copyright 2024-2026 Professor (Michael Anthony Lopez)
artifactName: Cerebro-Installer.${ext}

directories:
  output: dist
  buildResources: assets

# Files included inside the asar bundle (the Electron app itself)
files:
  - electron/**/*
  - frontend/**/*
  - assets/**/*
  - package.json
  - "!docker/**"      # v6: no docker
  - "!backend-src/**" # backend ships as binary in extraResources

# Backend binary + frontend static files ship as extraResources (NOT in asar).
# At runtime they live at process.resourcesPath/backend/ and process.resourcesPath/frontend/.
extraResources:
  - from: bundle/cerebro-backend
    to: backend/cerebro-backend
    filter: ["**/*"]
  - from: bundle/cerebro-backend.exe
    to: backend/cerebro-backend.exe
    filter: ["**/*"]
  - from: frontend
    to: frontend
    filter:
      - "**/*"
      - "!*.bak"
      - "!.DS_Store"

asar: true
asarUnpack:
  - "**/*.node"

win:
  icon: assets/icon.ico
  target:
    - target: nsis
      arch:
        - x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  allowElevation: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Cerebro
  uninstallDisplayName: Cerebro
  installerIcon: assets/icon.ico
  uninstallerIcon: assets/icon.ico
  installerHeaderIcon: assets/icon.ico
  include: build/installer.nsh
  runAfterFinish: true

linux:
  icon: assets/icon.png
  category: Utility
  executableName: cerebro-desktop
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  desktop:
    Name: Cerebro
    Comment: Your AI, Everywhere
    Categories: Utility;ArtificialIntelligence;Science;
    StartupWMClass: cerebro-desktop
    Terminal: false

deb:
  afterInstall: build/after-install.sh
  afterRemove: build/after-remove.sh
  depends:
    - libnotify4
    - libxtst6
    - libnss3

publish:
  provider: github
  owner: Professor-Low
  repo: Cerebro-life-desktop
