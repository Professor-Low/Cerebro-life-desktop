name: PR Validation

on:
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm ci
      - name: Lint — verify no require('docker-manager')
        run: |
          if grep -r "require.*docker-manager" electron/main.js; then
            echo "ERROR: main.js still references docker-manager"
            exit 1
          fi
      - name: Validate Electron entry point
        run: node -e "require('./electron/native-manager')"
      - name: Verify package.json version
        run: node -e "const p=require('./package.json'); console.log('Version:', p.version)"
